name: Send.Trade Scan

on:
  # External hourly trigger via cron-job.org -> repository_dispatch webhook.
  # This is the PRIMARY trigger because GH's native cron silently drops runs
  # under platform load.
  repository_dispatch:
    types: [hourly-scan]
  # Native GH cron as an infrequent backstop in case cron-job.org is down.
  # Runs 4x/day at :42 — deliberately offset from cron-job.org's :12 so the
  # two schedulers never fire in the same minute and race on the snapshot
  # commit. (cron-job.org is the primary hourly trigger.)
  schedule:
    - cron: "42 */6 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run exhaustive backfill via GeckoTerminal (slower, one-time)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python daily_scan.py --backfill
          else
            python daily_scan.py
          fi

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshots/ data/decimals_cache.json data/dismissed.json
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
            # Retry push, handling races with concurrent runs (cron-job.org +
            # GH native cron can both fire this workflow in the same minute and
            # rewrite the same snapshot file). On rejection, merge remote with
            # -X ours so our just-generated data wins on conflict, then retry.
            # Merge (not rebase) is used because rebase halts mid-operation on
            # a data-file conflict and leaves the repo in a broken state.
            for attempt in 1 2 3 4 5; do
              if git push; then exit 0; fi
              echo "push attempt $attempt rejected, merging remote (ours wins)..."
              git fetch origin main
              git merge -X ours --no-edit origin/main || true
            done
            echo "push failed after 5 retries"
            exit 1
          fi
