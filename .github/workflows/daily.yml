name: Send.Trade Scan

on:
  schedule:
    # Day (8am-8pm ET DST = 12-23 UTC): every hour at :12
    # Night (8pm ET -> 8am ET): every 3 hours — 8pm, 11pm, 2am, 5am ET
    #                          = 00:12, 03:12, 06:12, 09:12 UTC
    # 16 runs/day total. During EST (winter) the windows drift back 1hr in ET.
    - cron: "12 0,3,6,9,12-23 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run exhaustive backfill via GeckoTerminal (slower, one-time)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python daily_scan.py --backfill
          else
            python daily_scan.py
          fi

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshots/ data/decimals_cache.json data/dismissed.json
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
