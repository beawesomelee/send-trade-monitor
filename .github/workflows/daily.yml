name: Send.Trade Scan

on:
  # External hourly trigger via cron-job.org -> repository_dispatch webhook.
  # This is the PRIMARY trigger because GH's native cron silently drops runs
  # under platform load.
  repository_dispatch:
    types: [hourly-scan]
  # Native GH cron as a backstop in case the external service is down.
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run exhaustive backfill via GeckoTerminal (slower, one-time)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python daily_scan.py --backfill
          else
            python daily_scan.py
          fi

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshots/ data/decimals_cache.json data/dismissed.json
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
            # Retry push with rebase to handle race condition with the
            # movement.yml workflow (or any concurrent push to main).
            for attempt in 1 2 3; do
              if git push; then exit 0; fi
              echo "push attempt $attempt failed, pulling + rebasing..."
              git pull --rebase origin main
            done
            echo "push failed after 3 retries"
            exit 1
          fi
