name: Send.Trade Scan

on:
  schedule:
    # Hourly, 24/7, every day. Two staggered crons so GH Actions scheduler
    # drops at most one of any given hour pair (it routinely silently skips
    # cron runs under platform load — staggering gives the hour redundancy).
    - cron: "12 * * * *"
    - cron: "42 * * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run exhaustive backfill via GeckoTerminal (slower, one-time)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python daily_scan.py --backfill
          else
            python daily_scan.py
          fi

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshots/ data/decimals_cache.json data/dismissed.json
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
