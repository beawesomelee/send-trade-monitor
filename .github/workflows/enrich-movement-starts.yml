name: Enrich Movement Starts

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch/ref containing the enrichment code and dataset"
        type: string
        default: "main"
      threshold_pct:
        description: "Percent move from local extreme used as start threshold"
        type: string
        default: "15"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Backfill movement events from watcher state
        run: python scripts/backfill_movement_events.py --apply

      - name: Enrich movement starts
        env:
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          python scripts/enrich_movement_starts.py --apply --threshold-pct "${{ inputs.threshold_pct }}"

      - name: Commit enriched movement events
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/movement_events.json
          if git diff --staged --quiet; then
            echo "No movement event changes"
          else
            git commit -m "Enrich movement start estimates $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:${{ inputs.target_ref }}
          fi
