name: Movement Scan (h1)

on:
  # External trigger via cron-job.org -> repository_dispatch webhook is the
  # PRIMARY scheduler (GH native cron is unreliable; drops runs under load).
  # Movement runs every 15 min so the rolling-h1 sample lands close to a
  # pump's peak instead of only checking once an hour (see README "h1 is
  # rolling, not a fixed candle" note).
  repository_dispatch:
    types: [hourly-movement]
  # Native GH cron backstop, also every 15 min (offset from daily.yml's :12).
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      h6_fallback:
        description: "Also try h6 window if h1 finds nothing (manual testing)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  movement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run movement scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DOCS_PASSWORD: ${{ secrets.DOCS_PASSWORD }}
        run: |
          if [ "${{ inputs.h6_fallback }}" = "true" ]; then
            python movement_scan.py --alert --h6-fallback
          else
            python movement_scan.py --alert
          fi

      - name: Commit alert state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/movement_alerts.json data/watcher.json || true
          if git diff --staged --quiet; then echo "No alert state changes"; else
            git commit -m "Movement alert state $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry push with rebase to handle race condition with daily.yml
            # or any concurrent push to main.
            for attempt in 1 2 3; do
              if git push; then exit 0; fi
              echo "push attempt $attempt failed, pulling + rebasing..."
              git pull --rebase origin main
            done
            echo "push failed after 3 retries"
            exit 1
          fi
