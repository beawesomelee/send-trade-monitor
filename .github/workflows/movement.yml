name: Movement Scan (h1)

on:
  schedule:
    # Hourly, 24/7, every day of the week. Two staggered crons so GH Actions
    # scheduler drops at most one of any given hour pair (it routinely
    # silently skips cron runs under platform load — staggering gives the
    # hour redundancy).
    - cron: "22 * * * *"
    - cron: "52 * * * *"
  workflow_dispatch:
    inputs:
      h6_fallback:
        description: "Also try h6 window if h1 finds nothing (manual testing)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  movement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run movement scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ "${{ inputs.h6_fallback }}" = "true" ]; then
            python movement_scan.py --alert --h6-fallback
          else
            python movement_scan.py --alert
          fi

      - name: Commit alert state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/movement_alerts.json || true
          if git diff --staged --quiet; then echo "No alert state changes"; else
            git commit -m "Movement alert state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
