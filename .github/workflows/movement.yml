name: Movement Scan (h6)

on:
  # External trigger via cron-job.org -> repository_dispatch webhook is the
  # PRIMARY scheduler (GH native cron is unreliable; drops runs under load).
  # Detection uses the 6h window, which decays slowly enough that checking
  # once an hour gives ~6 looks at any move — no need for sub-hourly cadence.
  repository_dispatch:
    types: [hourly-movement]
  # Native GH cron as a backstop in case cron-job.org is down. Hourly at :37,
  # offset from the daily scan and cron-job.org's minute so they never race.
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:
    inputs:
      h1:
        description: "Use the 1h window instead of the default 6h (testing)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  movement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run movement scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GECKOTERMINAL_API_KEY: ${{ secrets.GECKOTERMINAL_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DOCS_PASSWORD: ${{ secrets.DOCS_PASSWORD }}
        run: |
          if [ "${{ inputs.h1 }}" = "true" ]; then
            python movement_scan.py --alert --h1
          else
            python movement_scan.py --alert
          fi

      - name: Sync watcher rules to X
        # Non-blocking: this is optional enrichment. If X_BEARER_TOKEN isn't
        # set (or the X API errors), don't fail the whole workflow or skip the
        # cooldown-state commit below — the core movement scan already ran.
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scripts/sync_watcher_rules.py --apply

      - name: Commit alert state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/movement_alerts.json data/watcher.json || true
          if git diff --staged --quiet; then echo "No alert state changes"; else
            git commit -m "Movement alert state $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry push, handling races with concurrent runs. On rejection,
            # merge remote with -X ours so our just-written alert state wins,
            # then retry. Merge (not rebase) avoids the halt-on-conflict that
            # leaves the repo broken mid-operation.
            for attempt in 1 2 3 4 5; do
              if git push; then exit 0; fi
              echo "push attempt $attempt rejected, merging remote (ours wins)..."
              git fetch origin main
              git merge -X ours --no-edit origin/main || true
            done
            echo "push failed after 5 retries"
            exit 1
          fi
